name: Unzip and Commit

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unzip file
        run: |
          # Encontra todos os arquivos .zip
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              echo "Descompactando: $zipfile"
              # Cria pasta com o nome do ZIP (sem extensão)
              folder="${zipfile%.zip}"
              mkdir -p "$folder"
              unzip -q "$zipfile" -d "$folder"
              # Remove o arquivo ZIP original
              rm "$zipfile"
              echo "✓ $zipfile descompactado em $folder"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verifica se há mudanças
          if git diff-index --quiet HEAD --; then
            echo "Nenhuma mudança para fazer commit"
          else
            git add .
            git commit -m "🤖 Automatically unzip uploaded files"
            git push
          fi
